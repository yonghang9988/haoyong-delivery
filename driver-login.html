<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>豪勇配送司机登录</title>
    <link rel="stylesheet" href="driver-login.css" />
  </head>
  <body>
    <main class="login-app">
      <section class="login-card">
        <a class="brand" href="index.html" aria-label="返回后台">
          <span>豪</span>
          <strong>豪勇配送</strong>
        </a>
        <p class="eyebrow">Driver App</p>
        <h1>司机登录</h1>
        <p class="intro">登录后查看今日配送任务、调度指令、路线导航和拍照回单。</p>

        <form class="login-form" id="driver-login-form">
          <label>
            手机号 / 工号
            <input id="driver-account" type="text" inputmode="tel" autocomplete="username" placeholder="例：13800000000 或 HY-001" />
          </label>
          <label>
            验证码
            <div class="code-row">
              <input id="driver-code" type="text" inputmode="numeric" autocomplete="one-time-code" placeholder="输入 6 位验证码" />
              <button type="button" id="send-code">获取验证码</button>
            </div>
          </label>
          <label class="remember-row">
            <input id="remember-driver" type="checkbox" checked />
            记住本机司机身份
          </label>
          <button class="login-button" type="submit">进入司机端</button>
        </form>

        <div class="demo-tip">
          <strong>演示账号</strong>
          <span>工号：HY-001</span>
          <span>验证码：任意 6 位数字</span>
        </div>
      </section>
    </main>

    <div class="toast" role="status" aria-live="polite"></div>
    <script src="driver-login.js"></script>
  </body>
</html>
